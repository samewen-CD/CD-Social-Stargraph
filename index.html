<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoinDesk Star System</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050a1a;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;width:100vw;height:100vh}
    canvas{display:block}

    /* ── Tooltip ─────────────────────────────────────────────────────────── */
    #tooltip{
      position:absolute;background:rgba(8,16,42,0.97);
      border:1px solid rgba(240,165,0,0.55);border-radius:10px;
      padding:10px 14px;pointer-events:none;opacity:0;
      transition:opacity 0.2s;max-width:240px;
      box-shadow:0 0 24px rgba(240,165,0,0.2);
    }
    #tooltip .ttN{color:#fff;font-size:14px;font-weight:700;margin-bottom:4px}
    #tooltip .ttR{color:#f0c060;font-size:12px;line-height:1.4}

    /* ── Legend ──────────────────────────────────────────────────────────── */
    #legend{position:absolute;top:18px;left:18px;display:flex;flex-direction:column;gap:7px}
    .li{display:flex;align-items:center;gap:8px;font-size:11px;color:#99aacc}
    .ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}

    /* ── Loading ─────────────────────────────────────────────────────────── */
    #loading{
      position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
      color:rgba(240,165,0,0.6);font-size:11px;letter-spacing:2px;
      text-transform:uppercase;transition:opacity 0.6s;white-space:nowrap;
    }

    /* ── Center logo ─────────────────────────────────────────────────────── */
    #centerLogo{
      position:absolute;border-radius:50%;overflow:hidden;
      border:2.5px solid rgba(240,165,0,0.8);background:#000;
      pointer-events:none;display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 30px rgba(240,165,0,0.35),0 0 60px rgba(240,165,0,0.15);
    }
    #centerLogo img{width:80%;height:80%;object-fit:contain}

    /* ── Company panel (right side) ──────────────────────────────────────── */
    #company-panel{
      position:fixed;right:18px;top:18px;width:148px;
      display:flex;flex-direction:column;gap:6px;z-index:100;
    }
    .co-header{
      color:#00e5aa;font-size:10px;letter-spacing:2px;
      text-transform:uppercase;margin-bottom:2px;
    }
    .co-item{
      display:flex;align-items:center;gap:8px;
      cursor:pointer;padding:3px 0;
    }
    .co-item:hover .co-name{color:#fff}
    .co-avatar{
      width:26px;height:26px;border-radius:50%;
      object-fit:cover;flex-shrink:0;
      border:1.5px solid rgba(0,229,170,0.45);
    }
    .co-avatar-fb{
      width:26px;height:26px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:11px;color:#050a1a;background:#00e5aa;
    }
    .co-name{
      color:#aabbd4;font-size:11px;font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      transition:color 0.15s;
    }

    /* ── Tweet stack (left side, below legend) ───────────────────────────── */
    #tweet-panel{
      position:fixed;left:18px;top:148px;
      width:262px;display:flex;flex-direction:column;gap:5px;z-index:100;
    }
    .tw-card{
      background:rgba(8,16,42,0.93);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:8px;padding:8px 10px 8px 0;
      display:flex;align-items:flex-start;gap:8px;
      cursor:pointer;
      border-left-width:3px;border-left-style:solid;
      transform:translateY(18px);opacity:0;
      transition:transform 0.45s cubic-bezier(0.22,1,0.36,1),opacity 0.45s;
    }
    .tw-card.visible{transform:translateY(0);opacity:1}
    .tw-card.gone{transform:translateY(-18px);opacity:0;transition:transform 0.3s ease-in,opacity 0.3s}
    .tw-av{
      width:30px;height:30px;border-radius:50%;
      object-fit:cover;flex-shrink:0;margin-left:8px;
    }
    .tw-av-fb{
      width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-left:8px;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:12px;color:#050a1a;
    }
    .tw-body{flex:1;min-width:0}
    .tw-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:nowrap}
    .tw-name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
    .tw-handle{font-size:10px;white-space:nowrap}
    .tw-time{font-size:10px;color:rgba(180,200,255,0.4);margin-left:auto;white-space:nowrap}
    .tw-text{
      font-size:11px;color:#b8cce0;
      display:-webkit-box;-webkit-line-clamp:2;
      -webkit-box-orient:vertical;overflow:hidden;
    }
    .tw-new{
      font-size:9px;font-weight:800;letter-spacing:1px;
      color:#050a1a;background:#f0a500;
      padding:1px 5px;border-radius:3px;flex-shrink:0;
    }
    @keyframes newPulse{0%,100%{opacity:1}50%{opacity:0.35}}
    .tw-card.is-new{animation:newPulse 2s ease-in-out infinite}
  </style>
</head>

// ── Image cache ───────────────────────────────────────────────────────────────
const imgCache = {};
let loaded = 0;
const TOTAL = nodes.length + 1;

function loadImg(src) {
  return new Promise(res => {
    let settled = false;
    const finish = v => { if (!settled) { settled = true; clearTimeout(tid); res(v); } };
    const img = new Image();
    img.onload  = () => finish(img.width > 1 ? img : null);
    img.onerror = () => finish(null);
    img.src = src;
    const tid = setTimeout(() => finish(null), 8000);
  });
}

async function fetchPersonImage(n) {
  const key = n.name.replace('\n',' ');
  imgCache[key] = 'loading';
  if (n.tw) {
    const img = await loadImg(`https://unavatar.io/twitter/${n.tw}`);
    if (img) { imgCache[key] = img; loaded++; updateLoader(); return; }
    const img2 = await loadImg(`https://unavatar.io/x/${n.tw}`);
    if (img2) { imgCache[key] = img2; loaded++; updateLoader(); return; }
  }
  if (n.wiki) {
    try {
      const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(n.wiki)}&prop=pageimages&format=json&pithumbsize=120&origin=*`);
      const d = await r.json();
      for (const p of Object.values(d.query.pages)) {
        if (p.thumbnail?.source) {
          const img = await loadImg(p.thumbnail.source);
          if (img) { imgCache[key] = img; loaded++; updateLoader(); return; }
        }
      }
    } catch {}
  }
  imgCache[key] = null; loaded++; updateLoader();
}

async function loadAllImages() {
  loaded++; updateLoader();
  for (let i = 0; i < nodes.length; i += 6) {
    await Promise.all(nodes.slice(i, i+6).map(fetchPersonImage));
  }
  loadEl.style.opacity = '0';
  setTimeout(() => loadEl.style.display='none', 700);
}

function updateLoader() {
  loadEl.textContent = `Loading photos… ${loaded}/${TOTAL}`;
}

// ── Layout ────────────────────────────────────────────────────────────────────
let W, H, cx, cy;
let nodeState = [];
let peerEdges = [];
let hoveredIdx = -1;
let time = 0;
let followDataLoaded = false;

function positionLogo() {
  const baseR = Math.min(W, H) * 0.062;
  const el = document.getElementById('centerLogo');
  const d  = baseR * 2;
  el.style.width  = d + 'px';
  el.style.height = d + 'px';
  el.style.left   = (cx - baseR) + 'px';
  el.style.top    = (cy - baseR) + 'px';
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  bgCanvas = null;
  computeLayout();
  positionLogo();
}

function computeLayout() {
  const md = Math.min(W, H);
  // 2-ring layout: GOVT+FIN inner, CRYPTO+MEDIA outer. CORP in right panel.
  const r1 = md * 0.22, r2 = md * 0.42;

  const ring1 = nodes.filter(n => n.cat.ring === 1);
  const ring2 = nodes.filter(n => n.cat.ring === 2);

  nodeState = [];
  ring1.forEach((n,i) => {
    const a = (2*Math.PI / Math.max(ring1.length, 1)) * i - Math.PI/2;
    nodeState.push({...n, baseAngle:a, r:r1, speed:0.00012, x:cx+r1*Math.cos(a), y:cy+r1*Math.sin(a), radius:22});
  });
  ring2.forEach((n,i) => {
    const a = (2*Math.PI / Math.max(ring2.length, 1)) * i - Math.PI/3;
    nodeState.push({...n, baseAngle:a, r:r2, speed:0.00007, x:cx+r2*Math.cos(a), y:cy+r2*Math.sin(a), radius:20});
  });

  if (peerEdges.length === 0 && !followDataLoaded) generatePeerEdges();
}

function generatePeerEdges() {
  let seed = 42;
  const rand = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };
  const n = nodeState.length;
  const edgeSet = new Set();
  const deg = new Array(n).fill(0);
  const addEdge = (a, b) => {
    if (a === b) return;
    const key = `${Math.min(a,b)}-${Math.max(a,b)}`;
    if (edgeSet.has(key)) return;
    edgeSet.add(key); deg[a]++; deg[b]++;
    peerEdges.push({ a, b, phase: rand() * Math.PI * 2 });
  };
  for (let i = 0; i < n; i++) {
    const same = nodeState.map((_,j)=>j).filter(j => j !== i && nodeState[j].cat === nodeState[i].cat);
    const picks = Math.floor(rand() * 2) + 1;
    for (let p = 0; p < picks; p++) {
      const j = same[Math.floor(rand() * same.length)];
      if (j !== undefined) addEdge(i, j);
    }
  }
  for (let e = 0; e < 34; e++) {
    const a = Math.floor(rand() * n), b = Math.floor(rand() * n);
    if (deg[a] < 5 && deg[b] < 5) addEdge(a, b);
  }
}

// ── Stars ─────────────────────────────────────────────────────────────────────
const stars = Array.from({length:150}, () => ({
  x:Math.random(), y:Math.random(), s:Math.random()*1.8+0.2, a:Math.random()
}));
function drawStars() {
  stars.forEach(s => {
    const f = 0.4 + 0.6*(0.5 + 0.5*Math.sin(time*0.001*s.s + s.a*100));
    ctx.globalAlpha = f*s.a; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.s*0.65, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawOrbitRing(r, a=0.09) {
  ctx.save(); ctx.strokeStyle = `rgba(240,165,0,${a})`; ctx.lineWidth = 1;
  ctx.setLineDash([4,14]);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

// ── Center node ───────────────────────────────────────────────────────────────
function drawCenter() {
  const pulse = 1 + 0.03*Math.sin(time*0.002);
  const baseR = Math.min(W, H)*0.062*pulse;

  [0.065, 0.22].forEach((a,i) => {
    const gr = ctx.createRadialGradient(cx,cy,0, cx,cy, baseR*(2.7-i*0.8));
    gr.addColorStop(0, `rgba(240,165,0,${a})`); gr.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx,cy, baseR*(2.7-i*0.8), 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
  });

  ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(240,165,0,0.78)'; ctx.lineWidth = 2.5; ctx.stroke();

  const el = document.getElementById('centerLogo');
  const d  = baseR*2;
  el.style.width  = d+'px'; el.style.height = d+'px';
  el.style.left   = (cx-baseR)+'px'; el.style.top = (cy-baseR)+'px';
}

// ── Edges ─────────────────────────────────────────────────────────────────────
function drawAllEdges() {
  const n = nodeState.length;
  for (let i = 0; i < n; i++) {
    const nd = nodeState[i], hov = hoveredIdx === i;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nd.x,nd.y);
    ctx.lineWidth   = hov ? 2.5 : 1.2;
    ctx.strokeStyle = hov ? nd.cat.color+'cc' : 'rgba(240,165,0,0.32)';
    ctx.stroke();
  }
  peerEdges.forEach(e => {
    const na = nodeState[e.a], nb = nodeState[e.b]; if (!na||!nb) return;
    const active = hoveredIdx===e.a || hoveredIdx===e.b;
    const pulse  = 0.5 + 0.5*Math.sin(time*0.0008 + e.phase);
    if (active) {
      const gr = ctx.createLinearGradient(na.x,na.y,nb.x,nb.y);
      gr.addColorStop(0, na.cat.color+'ee'); gr.addColorStop(1, nb.cat.color+'ee');
      ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y);
      ctx.lineWidth = 2; ctx.strokeStyle = gr; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y);
      ctx.lineWidth   = 1.0;
      ctx.strokeStyle = `rgba(180,200,255,${(0.18+0.10*pulse).toFixed(2)})`;
      ctx.stroke();
    }
  });
}

// ── Node ──────────────────────────────────────────────────────────────────────
function drawNode(n, idx) {
  const hov   = hoveredIdx === idx;
  const pulse = 1 + 0.05*Math.sin(time*0.003 + n.baseAngle);
  const r     = n.radius * (hov ? 1.4 : pulse);
  const key   = n.name.replace('\n',' ');
  const img   = imgCache[key];

  // Glow — gradient only for hovered; flat fill otherwise (saves 31 gradient objects/frame)
  ctx.beginPath(); ctx.arc(n.x,n.y,r*1.7,0,Math.PI*2);
  if (hov) {
    const grd = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*1.7);
    grd.addColorStop(0, n.cat.glow.replace('0.4','0.55')); grd.addColorStop(1,'transparent');
    ctx.fillStyle = grd;
  } else {
    ctx.fillStyle = n.cat.glow.replace('0.4','0.10');
  }
  ctx.fill();

  ctx.beginPath(); ctx.arc(n.x,n.y,r+1,0,Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill();

  ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
  if (img && img !== 'loading') {
    ctx.fillStyle = '#111'; ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.clip();
    const iw=img.width, ih=img.height, side=Math.min(iw,ih);
    const sx=(iw-side)/2, sy=(ih-side)/2;
    ctx.drawImage(img, sx,sy,side,side, n.x-r,n.y-r,r*2,r*2);
    ctx.restore();
  } else {
    const nd = ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.3,0,n.x,n.y,r);
    nd.addColorStop(0,'#fff'); nd.addColorStop(0.3,n.cat.color); nd.addColorStop(1,n.cat.color+'44');
    ctx.fillStyle = nd; ctx.fill();
    const init = n.name.replace('\n',' ').split(' ').filter(w=>w.length).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    ctx.save(); ctx.font=`bold ${Math.round(r*0.68)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(init, n.x, n.y); ctx.restore();
  }

  ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
  ctx.strokeStyle = hov ? n.cat.color : n.cat.color+'66';
  ctx.lineWidth = hov ? 2.5 : 1.2; ctx.stroke();

  // Labels — skip shadow for non-hovered (GPU-expensive)
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='top';
  if (hov) { ctx.shadowColor=n.cat.color; ctx.shadowBlur=14; }
  const fs = hov ? 13 : 10.5;
  ctx.font = `${hov?700:600} ${fs}px 'Segoe UI',Arial`;
  ctx.fillStyle = hov ? '#fff' : '#ddeeff';
  const nameLines = n.name.split('\n');
  const ly = n.y + r + 5;
  nameLines.forEach((line,li) => ctx.fillText(line, n.x, ly + li*(fs+2)));
  const orgY = ly + nameLines.length*(fs+2) + 1;
  const ofs = hov ? 11 : 9;
  ctx.font = `500 ${ofs}px 'Segoe UI',Arial`;
  ctx.fillStyle = n.cat.color;
  if (hov) ctx.shadowBlur = 8;
  ctx.fillText(n.org, n.x, orgY);
  ctx.restore();
}

// ── Background offscreen cache ────────────────────────────────────────────────
let bgCanvas = null;
function ensureBg() {
  if (bgCanvas && bgCanvas.width === W && bgCanvas.height === H) return;
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bc = bgCanvas.getContext('2d');
  const gr = bc.createRadialGradient(cx,cy,0, cx,cy, Math.max(W,H)*0.8);
  gr.addColorStop(0,'#0a1525'); gr.addColorStop(1,'#050a1a');
  bc.fillStyle = gr; bc.fillRect(0,0,W,H);
}

// ── Render loop (capped at 30fps) ─────────────────────────────────────────────
let frameCount  = 0;
let lastFrameTs = 0;
const FRAME_MS  = 1000 / 30;

function frame(ts) {
  requestAnimationFrame(frame); // FIRST — loop survives any error below
  const elapsed = ts - lastFrameTs;
  if (elapsed < FRAME_MS) return;
  lastFrameTs = ts;
  frameCount++;
  time = ts;

  try {
    const dt = Math.min(elapsed, 50) / 16.667; // normalise to 60fps-equivalent
    const md = Math.min(W, H);

    ensureBg();
    ctx.drawImage(bgCanvas, 0, 0);
    drawStars();

    nodeState.forEach(n => {
      n.baseAngle += n.speed * dt;
      n.x = cx + n.r*Math.cos(n.baseAngle);
      n.y = cy + n.r*Math.sin(n.baseAngle);
    });

    // Repulsion every 4th frame
    if (frameCount % 4 === 0) {
      const MIN_DIST = 72, REPULSE = 0.000072;
      for (let i = 0; i < nodeState.length; i++) {
        for (let j = i+1; j < nodeState.length; j++) {
          const a = nodeState[i], b = nodeState[j];
          const dx = b.x-a.x, dy = b.y-a.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if (dist < MIN_DIST && dist > 0) {
            const force = (MIN_DIST-dist)/MIN_DIST*REPULSE;
            a.baseAngle -= force; b.baseAngle += force;
            a.x = cx+a.r*Math.cos(a.baseAngle); a.y = cy+a.r*Math.sin(a.baseAngle);
            b.x = cx+b.r*Math.cos(b.baseAngle); b.y = cy+b.r*Math.sin(b.baseAngle);
          }
        }
      }
    }

    drawOrbitRing(md*0.22, 0.08);
    drawOrbitRing(md*0.42, 0.07);
    drawAllEdges();
    nodeState.forEach((n,i) => drawNode(n,i));
    drawCenter();
    updateTweetLinePositions();
  } catch(e) {
    console.error('[frame]', e);
  }
}

// ── Mouse ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let found = -1;
  nodeState.forEach((n,i) => {
    const dx=mx-n.x, dy=my-n.y;
    if (Math.sqrt(dx*dx+dy*dy) < n.radius*1.8) found=i;
  });
  hoveredIdx = found;
  if (found >= 0) {
    const n = nodeState[found];
    ttN.textContent = n.name.replace('\n',' ');
    ttR.textContent = n.role || '';
    tip.style.opacity = '1';
    let tx=e.clientX+16, ty=e.clientY-8;
    if (tx+250>W) tx=e.clientX-258;
    if (ty+80>H)  ty=e.clientY-88;
    tip.style.left=tx+'px'; tip.style.top=ty+'px';
    canvas.style.cursor='pointer';
  } else {
    tip.style.opacity='0'; canvas.style.cursor='default';
  }
});
canvas.addEventListener('mouseleave', () => { hoveredIdx=-1; tip.style.opacity='0'; });
window.addEventListener('resize', resize);

// ── Tweet system ──────────────────────────────────────────────────────────────
const WORKER_URL     = 'https://cool-pine-8cd1.sam-ewen.workers.dev';
const FETCH_INTERVAL = 5 * 60 * 1000;
const MAX_TWEET_AGE  = 3 * 60 * 60 * 1000;
const NEW_TWEET_AGE  = 30 * 60 * 1000;
const CYCLE_INTERVAL = 10_000;
const MAX_STACK      = 4;

const tweetCache = {};
let   tweetQueue  = [];
const stackCards  = [];

// All nodes including CORP — used for tweet lookup
const allNodes = nodes; // alias for clarity

async function fetchTweets() {
  try {
    const handles = [...new Set([...allNodes.map(n=>n.tw).filter(Boolean), 'CoinDesk'])];
    const BATCH = 30;
    const batches = [];
    for (let i = 0; i < handles.length; i += BATCH) batches.push(handles.slice(i, i + BATCH));
    const results = await Promise.all(batches.map(async batch => {
      const res = await fetch(`${WORKER_URL}/tweets?handles=${batch.join(',')}`);
      if (!res.ok) { console.warn(`[tweets] batch failed HTTP ${res.status}`); return {}; }
      return res.json();
    }));
    const data = Object.assign({}, ...results);
    Object.assign(tweetCache, data);
    console.log(`[tweets] loaded ${Object.keys(data).length} tweets across ${batches.length} batches`);
    rebuildQueue();
  } catch(e) {
    console.warn('[tweets] fetch failed:', e);
  }
}

function rebuildQueue() {
  const now = Date.now();
  // All nodes (orbit + CORP) by index into allNodes[]
  const regular = allNodes
    .map((_,i) => i)
    .filter(i => {
      const tweet = tweetCache[allNodes[i]?.tw?.toLowerCase()];
      if (!tweet) return false;
      const age = now - new Date(tweet.created).getTime();
      return !isNaN(age) && age < MAX_TWEET_AGE;
    });

  // CoinDesk center node
  const cdTweet = tweetCache['coindesk'];
  const cdAge   = cdTweet ? now - new Date(cdTweet.created).getTime() : NaN;
  const cdValid = !isNaN(cdAge) && cdAge < MAX_TWEET_AGE;

  const all = [...regular, ...(cdValid ? [COINDESK_IDX] : [])];

  all.sort((a, b) => {
    const getCreated = i => i === COINDESK_IDX
      ? new Date(tweetCache['coindesk']?.created || 0)
      : new Date(tweetCache[allNodes[i]?.tw?.toLowerCase()]?.created || 0);
    return getCreated(a) - getCreated(b);
  });

  tweetQueue = all;
}

// ── Tweet stack DOM ────────────────────────────────────────────────────────────
function timeAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr)) / 1000;
  if (diff < 60)    return `${Math.floor(diff)}s ago`;
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function truncate(text, max=120) {
  return text.length > max ? text.slice(0, max).trimEnd() + '…' : text;
}

function buildTweetCard(n, tweet) {
  try {
    const name   = String(tweet.name   || n.name.replace('\n',' '));
    const handle = String(tweet.handle || n.tw || '');
    const text   = truncate(String(tweet.text || ''));
    const age    = Date.now() - new Date(tweet.created).getTime();
    const isNew  = !isNaN(age) && age < NEW_TWEET_AGE;

    const card = document.createElement('div');
    card.className = 'tw-card' + (isNew ? ' is-new' : '');
    card.style.borderLeftColor = n.cat.color;

    if (tweet.id && handle) {
      card.addEventListener('click', () =>
        window.open(`https://x.com/${handle}/status/${tweet.id}`, '_blank', 'noopener'));
    }

    // Avatar
    let av;
    const src = tweet.avatar ? String(tweet.avatar) : '';
    if (src && /^https?:\/\//.test(src)) {
      av = document.createElement('img');
      av.className = 'tw-av'; av.alt = '';
      av.onerror = () => {
        const fb = document.createElement('div');
        fb.className = 'tw-av-fb'; fb.style.background = n.cat.color;
        fb.textContent = name[0] || '?'; av.replaceWith(fb);
      };
      av.src = src;
    } else {
      av = document.createElement('div');
      av.className = 'tw-av-fb'; av.style.background = n.cat.color;
      av.textContent = name[0] || '?';
    }

    const body = document.createElement('div');
    body.className = 'tw-body';

    const meta = document.createElement('div');
    meta.className = 'tw-meta';

    if (isNew) {
      const badge = document.createElement('span');
      badge.className = 'tw-new'; badge.textContent = 'NEW';
      meta.appendChild(badge);
    }
    const nameEl = document.createElement('span');
    nameEl.className = 'tw-name'; nameEl.textContent = name;
    const handleEl = document.createElement('span');
    handleEl.className = 'tw-handle'; handleEl.style.color = n.cat.color;
    handleEl.textContent = `@${handle}`;
    const timeEl = document.createElement('span');
    timeEl.className = 'tw-time'; timeEl.textContent = timeAgo(tweet.created);

    meta.appendChild(nameEl); meta.appendChild(handleEl); meta.appendChild(timeEl);

    const textEl = document.createElement('div');
    textEl.className = 'tw-text'; textEl.textContent = text;

    body.appendChild(meta); body.appendChild(textEl);
    card.appendChild(av); card.appendChild(body);
    return card;
  } catch(e) {
    console.warn('[buildTweetCard]', e);
    return null;
  }
}

function showTweetInStack(n, tweet) {
  const card = buildTweetCard(n, tweet);
  if (!card) return;
  const panel = document.getElementById('tweet-panel');
  panel.appendChild(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
  addTweetLine(card, n);
  stackCards.push(card);
  if (stackCards.length > MAX_STACK) {
    const old = stackCards.shift();
    removeTweetLine(old);
    old.classList.remove('visible'); old.classList.add('gone');
    setTimeout(() => old.remove(), 350);
  }
}

function cycleTweetStack() {
  try {
    if (tweetQueue.length === 0) return;
    const idx  = tweetQueue.shift();
    tweetQueue.push(idx);
    const isCD = (idx === COINDESK_IDX);
    const n    = isCD ? CD_NODE : allNodes[idx];
    if (!n) return;
    const handle = isCD ? 'coindesk' : n.tw?.toLowerCase();
    const tweet  = tweetCache[handle];
    if (!tweet) return;
    const age = Date.now() - new Date(tweet.created).getTime();
    if (isNaN(age) || age >= MAX_TWEET_AGE) return;
    showTweetInStack(n, tweet);
  } catch(e) {
    console.warn('[cycleTweetStack]', e);
  }
}

// ── Company panel ──────────────────────────────────────────────────────────────
function buildCompanyPanel() {
  const panel = document.getElementById('company-panel');
  if (!panel) return;
  panel.innerHTML = '';
  const hdr = document.createElement('div');
  hdr.className = 'co-header'; hdr.textContent = 'COMPANIES';
  panel.appendChild(hdr);
  nodes.filter(n => n.cat === CORP).forEach(n => {
    const item = document.createElement('div');
    item.className = 'co-item';
    item.title = n.org || '';
    if (n.tw) item.dataset.tw = n.tw; // used for tweet line targeting
    if (n.tw) item.addEventListener('click', () =>
      window.open(`https://x.com/${n.tw}`, '_blank', 'noopener'));

    const av = document.createElement('img');
    av.className = 'co-avatar'; av.alt = '';
    av.onerror = () => {
      const fb = document.createElement('div');
      fb.className = 'co-avatar-fb'; fb.textContent = n.name[0];
      av.replaceWith(fb);
    };
    av.src = `https://unavatar.io/twitter/${n.tw}`;

    const nm = document.createElement('div');
    nm.className = 'co-name'; nm.textContent = n.name;

    item.appendChild(av); item.appendChild(nm);
    panel.appendChild(item);
  });
}

// ── Tweet→Node connection lines (SVG overlay) ─────────────────────────────────
const lineSvg = document.getElementById('lineSvg');
const activeTweetLines = []; // { card, nodeStateIdx, line, rect, rectFrame }

function addTweetLine(card, n) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('stroke', n.cat.color);
  line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '4,7');
  line.setAttribute('opacity', '0');
  line.style.transition = 'opacity 0.5s';
  lineSvg.appendChild(line);
  requestAnimationFrame(() => requestAnimationFrame(() => line.setAttribute('opacity', '0.35')));

  const nodeStateIdx = nodeState.findIndex(ns => ns.tw === n.tw);
  if (nodeStateIdx >= 0) {
    // Orbit node — track moving canvas position
    activeTweetLines.push({ card, type:'orbit', nodeStateIdx, line, rect:null, rectFrame:-999 });
  } else if (n.cat === CORP) {
    // Company panel item — connect to right-side panel entry
    const targetEl = document.querySelector(`[data-tw="${n.tw}"]`);
    activeTweetLines.push({ card, type:'company', targetEl, line, rect:null, rectFrame:-999, targetRect:null });
  } else {
    line.remove(); // no valid target
  }
}

function removeTweetLine(card) {
  const idx = activeTweetLines.findIndex(e => e.card === card);
  if (idx < 0) return;
  const [entry] = activeTweetLines.splice(idx, 1);
  entry.line.setAttribute('opacity', '0');
  setTimeout(() => entry.line.remove(), 500);
}

function updateTweetLinePositions() {
  // Prune stale entries
  for (let i = activeTweetLines.length - 1; i >= 0; i--) {
    if (!document.body.contains(activeTweetLines[i].card)) {
      activeTweetLines[i].line.remove();
      activeTweetLines.splice(i, 1);
    }
  }
  activeTweetLines.forEach(entry => {
    // Refresh card rect every 10 frames to avoid layout thrashing
    if (frameCount - entry.rectFrame >= 10) {
      entry.rect = entry.card.getBoundingClientRect();
      entry.rectFrame = frameCount;
    }
    if (!entry.rect) return;
    const x1 = entry.rect.right;
    const y1 = entry.rect.top + entry.rect.height / 2;

    let x2, y2;
    if (entry.type === 'orbit') {
      const ns = nodeState[entry.nodeStateIdx];
      if (!ns) return;
      x2 = ns.x; y2 = ns.y;
    } else {
      // Company panel item — static target, read once then cache
      if (!entry.targetRect) entry.targetRect = entry.targetEl?.getBoundingClientRect();
      if (!entry.targetRect) return;
      x2 = entry.targetRect.left;
      y2 = entry.targetRect.top + entry.targetRect.height / 2;
    }

    entry.line.setAttribute('x1', x1);
    entry.line.setAttribute('y1', y1);
    entry.line.setAttribute('x2', x2);
    entry.line.setAttribute('y2', y2);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
requestAnimationFrame(frame);
loadAllImages();
buildCompanyPanel();

fetchTweets().then(() => {
  // Seed stack immediately with the most recent tweets (up to MAX_STACK)
  if (tweetQueue.length > 0) {
    const seeds = tweetQueue.slice(-Math.min(MAX_STACK, tweetQueue.length));
    seeds.forEach(seedIdx => {
      const isCD     = seedIdx === COINDESK_IDX;
      const seedNode = isCD ? CD_NODE : allNodes[seedIdx];
      const seedTweet= tweetCache[isCD ? 'coindesk' : seedNode?.tw?.toLowerCase()];
      if (seedNode && seedTweet) showTweetInStack(seedNode, seedTweet);
    });
  }
  setInterval(cycleTweetStack, CYCLE_INTERVAL);
});

setInterval(fetchTweets, FETCH_INTERVAL);
</script>
