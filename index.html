<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoinDesk Star System</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050a1a;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;width:100vw;height:100vh}
    canvas{display:block}
    #tooltip{
      position:absolute;background:rgba(8,16,42,0.97);
      border:1px solid rgba(240,165,0,0.55);border-radius:10px;
      padding:10px 14px;pointer-events:none;opacity:0;
      transition:opacity 0.2s;max-width:240px;
      box-shadow:0 0 24px rgba(240,165,0,0.2);
    }
    #tooltip .ttN{color:#fff;font-size:14px;font-weight:700;margin-bottom:4px}
    #tooltip .ttR{color:#f0c060;font-size:12px;line-height:1.4}
    #legend{position:absolute;top:18px;left:18px;display:flex;flex-direction:column;gap:7px}
    .li{display:flex;align-items:center;gap:8px;font-size:11px;color:#99aacc}
    .ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}
    #loading{
      position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
      color:rgba(240,165,0,0.6);font-size:11px;letter-spacing:2px;
      text-transform:uppercase;transition:opacity 0.6s;white-space:nowrap;
    }
    /* ── Tweet cards ────────────────────────────────────────────────────── */
    .tweet-card {
      position: absolute;
      width: 240px;
      background: rgba(6, 14, 35, 0.96);
      border: 1px solid rgba(240,165,0,0.45);
      border-radius: 12px;
      padding: 11px 13px 10px;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(240,165,0,0.18), 0 4px 24px rgba(0,0,0,0.6);
      animation: tweetIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards,
                 tweetOut 0.4s ease-in var(--dur, 7s) forwards;
      z-index: 100;
    }
    @keyframes tweetIn  { from { opacity:0; transform:scale(0.8) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes tweetOut { from { opacity:1; transform:translateY(0);  } to { opacity:0; transform:translateY(-10px); } }
    .tweet-card .tc-header { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .tweet-card .tc-avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0; border:1px solid rgba(240,165,0,0.4); }
    .tweet-card .tc-avatar-placeholder { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#000; }
    .tweet-card .tc-meta { display:flex; flex-direction:column; }
    .tweet-card .tc-name { font-size:12px; font-weight:700; color:#fff; line-height:1.2; }
    .tweet-card .tc-handle { font-size:10px; color:rgba(240,165,0,0.7); }
    .tweet-card .tc-text { font-size:11.5px; color:#d8e8ff; line-height:1.5; margin-bottom:7px; word-break:break-word; }
    .tweet-card .tc-footer { display:flex; gap:12px; font-size:10px; color:rgba(180,200,255,0.5); align-items:center; }
    .tweet-card .tc-footer span { display:flex; align-items:center; gap:3px; }
    .tweet-card .tc-time { margin-left:auto; }
    #centerLogo{
      position:absolute;
      border-radius:50%;
      overflow:hidden;
      border:2.5px solid rgba(240,165,0,0.8);
      background:#000;
      pointer-events:none;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 30px rgba(240,165,0,0.35), 0 0 60px rgba(240,165,0,0.15);
      transition:box-shadow 0.3s;
    }
    #centerLogo img{
      width:80%;height:80%;
      object-fit:contain;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="centerLogo">
  <img id="cdLogo" src="https://thegivingblock.com/wp-content/uploads/2021/08/Coindesk-media-partners-the-giving-block-600px.png" alt="CoinDesk" crossorigin="anonymous"/>
</div>
<div id="tooltip"><div class="ttN" id="ttN"></div><div class="ttR" id="ttR"></div></div>
<div id="legend">
  <div style="color:#f0a500;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">CATEGORIES</div>
  <div class="li"><div class="ld" style="background:#f0a500"></div>Government / Policy</div>
  <div class="li"><div class="ld" style="background:#00d4ff"></div>Crypto Industry</div>
  <div class="li"><div class="ld" style="background:#b060ff"></div>Finance / Investing</div>
  <div class="li"><div class="ld" style="background:#ff6b6b"></div>Tech / Media</div>
</div>
<div id="loading">Loading photos…</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const tip    = document.getElementById('tooltip');
const ttN    = document.getElementById('ttN');
const ttR    = document.getElementById('ttR');
const loadEl = document.getElementById('loading');

// ── Categories ────────────────────────────────────────────────────────────────
const GOVT   = { color:'#f0a500', glow:'rgba(240,165,0,0.4)',   ring:1 };
const CRYPTO = { color:'#00d4ff', glow:'rgba(0,212,255,0.4)',   ring:2 };
const FIN    = { color:'#b060ff', glow:'rgba(176,96,255,0.4)',  ring:1 };
const MEDIA  = { color:'#ff6b6b', glow:'rgba(255,107,107,0.4)', ring:2 };

// ── Nodes: name, org, role, category, twitter handle, wikipedia title ────────
const nodes = [
  // Government / Policy (ring 1)
  { name:'Anthony Scaramucci',     org:'SkyBridge Capital',          role:'Former White House Communications Director',               cat:GOVT,   tw:'scaramucci',       wiki:'Anthony Scaramucci' },
  { name:'Brandon Lutnick',        org:'Cantor Fitzgerald',           role:'Chairman, Cantor Fitzgerald / Son of Secretary of Commerce', cat:GOVT, tw:'Brandonlutnick',    wiki:null },
  { name:'Senator Lummis',         org:'U.S. Senate',                 role:'U.S. Senator (WY)',                                        cat:GOVT,   tw:'CynthiaMLummis',    wiki:'Cynthia Lummis' },
  { name:'David Sacks',            org:'White House',                 role:'White House AI & Crypto Czar',                             cat:GOVT,   tw:'davidsacks47',      wiki:'David O. Sacks' },
  { name:'Hester Peirce',          org:'SEC',                         role:'SEC Commissioner ("Crypto Mom")',                          cat:GOVT,   tw:'HesterPeirce',      wiki:'Hester Peirce' },
  { name:'Patrick Witt',           org:'White House / PCADA',         role:"Executive Director, President's Council of Advisors for Digital Assets", cat:GOVT, tw:'patrickjwitt', wiki:null },
  { name:'Michael Selig',          org:'CFTC',                        role:'Chairman, CFTC',                                           cat:GOVT,   tw:'ChairmanSelig',     wiki:'Michael S. Selig' },
  // Crypto Industry (ring 2)
  { name:'Brian Armstrong',        org:'Coinbase',                    role:'CEO, Coinbase',                                            cat:CRYPTO, tw:'brian_armstrong',   wiki:'Brian Armstrong (businessman)' },
  { name:'Gracy Chen',             org:'Bitget',                      role:'CEO, Bitget',                                              cat:CRYPTO, tw:'GracyBitget',       wiki:null },
  { name:'Richard Teng',           org:'Binance',                     role:'Co-CEO, Binance',                                          cat:CRYPTO, tw:'_RichardTeng',      wiki:'Richard Teng' },
  { name:'Yi He',                  org:'Binance',                     role:'Co-CEO, Binance',                                          cat:CRYPTO, tw:'heyibinance',       wiki:null },
  { name:'Paolo Ardoino',          org:'Tether',                      role:'CEO, Tether',                                              cat:CRYPTO, tw:'paoloardoino',      wiki:'Paolo Ardoino' },
  { name:'Mike Belshe',            org:'BitGo',                       role:'CEO, BitGo',                                               cat:CRYPTO, tw:'mikebelshe',        wiki:'Mike Belshe' },
  { name:'Justin Sun',             org:'TRON',                        role:'Founder, TRON',                                            cat:CRYPTO, tw:'justinsuntron',     wiki:'Justin Sun (entrepreneur)' },
  { name:'Michael Saylor',         org:'Strategy',                    role:'Executive Chairman, Strategy',                             cat:CRYPTO, tw:'saylor',            wiki:'Michael Saylor' },
  { name:'Charles Hoskinson',      org:'Cardano / IOG',               role:'Co-Founder, Cardano / IOG',                               cat:CRYPTO, tw:'IOHK_Charles',      wiki:'Charles Hoskinson' },
  { name:'Anatoly Yakovenko',      org:'Solana',                      role:'Founder, Solana',                                          cat:CRYPTO, tw:'aeyakovenko',       wiki:'Anatoly Yakovenko' },
  { name:'Lily Liu',               org:'Solana Foundation',           role:'President, Solana Foundation',                             cat:CRYPTO, tw:'calilyliu',         wiki:null },
  { name:'Ella Zhang',             org:'YZi Labs',                    role:'Head of YZi Labs (Binance Labs)',                          cat:CRYPTO, tw:'ellazhang516',      wiki:null },
  { name:'Tyler & Cameron\nWinklevoss', org:'Gemini',                 role:'Co-Founders, Gemini',                                     cat:CRYPTO, tw:'tylerwinklevoss',   wiki:'Winklevoss twins' },
  { name:'Luana Lopes Lara',       org:'Kalshi',                      role:'Co-Founder, Kalshi',                                       cat:CRYPTO, tw:'luanalopeslara',    wiki:null },
  { name:'John Wang',              org:'Kalshi',                      role:'Head of Crypto, Kalshi',                                   cat:CRYPTO, tw:'j0hnwang',          wiki:null },
  { name:'Cat Ferdon',             org:'Coinbase',                    role:'CMO, Coinbase',                                            cat:CRYPTO, tw:'catferdon',         wiki:null },
  // Finance / Investing (ring 1)
  { name:'Tom Farley',             org:'Bullish',                     role:'CEO, Bullish / Former President, NYSE',                    cat:FIN,    tw:'ThomasFarley',      wiki:'Tom Farley (businessman)' },
  { name:"Kevin O'Leary",          org:"O'Leary Ventures",            role:'Investor & TV Personality ("Mr. Wonderful")',              cat:FIN,    tw:'kevinolearytv',     wiki:"Kevin O'Leary" },
  { name:'Tom Lee',                org:'Fundstrat',                   role:'CIO, Fundstrat',                                           cat:FIN,    tw:'fundstrat',         wiki:'Thomas Lee (analyst)' },
  { name:'Mike Novogratz',         org:'Galaxy Digital',              role:'CEO, Galaxy Digital',                                      cat:FIN,    tw:'novogratz',         wiki:'Michael Novogratz' },
  { name:'Robert Leshner',         org:'Superstate',                  role:'CEO, Superstate Inc.',                                     cat:FIN,    tw:'rleshner',          wiki:'Robert Leshner' },
  // Tech / Media (ring 2)
  { name:'Cuy Sheffield',          org:'Visa',                        role:'Head of Crypto, Visa',                                     cat:MEDIA,  tw:'cuysheffield',      wiki:null },
  { name:'Kate Rouch',             org:'OpenAI',                      role:'CMO, OpenAI',                                              cat:MEDIA,  tw:'kate_rouch',        wiki:null },
  { name:'Chamath Palihapitiya',   org:'Social Capital',              role:'Investor & All-In Podcast Co-Host',                        cat:FIN,    tw:'chamath',           wiki:'Chamath Palihapitiya' },
];

// ── Image cache: key -> HTMLImageElement | null | 'loading' ─────────────────
const imgCache = {};
let coinDeskLogo = null;
let loaded = 0;
const TOTAL = nodes.length + 1;

function loadImg(src) {
  return new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => res(img.width > 1 ? img : null);
    img.onerror = () => res(null);
    img.src = src;
    setTimeout(() => res(null), 8000); // 8s timeout
  });
}

async function fetchPersonImage(n) {
  const key = n.name.replace('\n',' ');
  imgCache[key] = 'loading';

  // 1. Try unavatar.io (Twitter profile photo)
  if (n.tw) {
    const img = await loadImg(`https://unavatar.io/twitter/${n.tw}`);
    if (img) { imgCache[key] = img; loaded++; updateLoader(); return; }
    // fallback: try x handle
    const img2 = await loadImg(`https://unavatar.io/x/${n.tw}`);
    if (img2) { imgCache[key] = img2; loaded++; updateLoader(); return; }
  }

  // 2. Try Wikipedia thumbnail
  if (n.wiki) {
    try {
      const r = await fetch(
        `https://en.wikipedia.org/w/api.php?action=query`+
        `&titles=${encodeURIComponent(n.wiki)}`+
        `&prop=pageimages&format=json&pithumbsize=120&origin=*`
      );
      const d = await r.json();
      for (const p of Object.values(d.query.pages)) {
        if (p.thumbnail?.source) {
          const img = await loadImg(p.thumbnail.source);
          if (img) { imgCache[key] = img; loaded++; updateLoader(); return; }
        }
      }
    } catch {}
  }

  imgCache[key] = null;
  loaded++;
  updateLoader();
}

async function loadAllImages() {
  // Logo is handled via HTML <img> element — skip canvas fetch
  loaded++;
  updateLoader();

  // Load all node photos in parallel batches of 6
  for (let i = 0; i < nodes.length; i += 6) {
    await Promise.all(nodes.slice(i, i+6).map(fetchPersonImage));
  }

  loadEl.style.opacity = '0';
  setTimeout(() => loadEl.style.display='none', 700);
}

function updateLoader() {
  loadEl.textContent = `Loading photos… ${loaded}/${TOTAL}`;
}

// ── Layout ────────────────────────────────────────────────────────────────────
let W, H, cx, cy;
let nodeState = [];
let peerEdges  = [];   // [{a, b, phase}]  — node-to-node connections
let hoveredIdx = -1;
let time = 0;

function positionLogo() {
  const baseR = Math.min(W,H)*0.062;
  const el = document.getElementById('centerLogo');
  const d  = baseR * 2;
  el.style.width  = d + 'px';
  el.style.height = d + 'px';
  el.style.left   = (cx - baseR) + 'px';
  el.style.top    = (cy - baseR) + 'px';
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  computeLayout();
  positionLogo();
}

function computeLayout() {
  const md = Math.min(W,H);
  const r1 = md*0.27, r2 = md*0.44;
  const ring1 = nodes.filter(n=>n.cat.ring===1);
  const ring2 = nodes.filter(n=>n.cat.ring===2);
  nodeState = [];
  ring1.forEach((n,i) => {
    const a = (2*Math.PI/ring1.length)*i - Math.PI/2;
    nodeState.push({...n, baseAngle:a, r:r1, speed:0.00013*(1+i*0.04),
      x:cx+r1*Math.cos(a), y:cy+r1*Math.sin(a), radius:26});
  });
  ring2.forEach((n,i) => {
    const a = (2*Math.PI/ring2.length)*i - Math.PI/3;
    nodeState.push({...n, baseAngle:a, r:r2, speed:0.00009*(1+i*0.03),
      x:cx+r2*Math.cos(a), y:cy+r2*Math.sin(a), radius:24});
  });
  // Only generate peer edges once (on first layout)
  if (peerEdges.length === 0) generatePeerEdges();
}

function generatePeerEdges() {
  // Seeded-ish random for reproducibility
  let seed = 42;
  const rand = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };

  const n = nodeState.length;
  const edgeSet = new Set();
  const degreeCount = new Array(n).fill(0);

  const addEdge = (a, b) => {
    if (a === b) return;
    const key = `${Math.min(a,b)}-${Math.max(a,b)}`;
    if (edgeSet.has(key)) return;
    edgeSet.add(key);
    degreeCount[a]++; degreeCount[b]++;
    peerEdges.push({ a, b, phase: rand() * Math.PI * 2 });
  };

  // 1. Same-category connections (cluster feel)
  for (let i = 0; i < n; i++) {
    const sameCat = nodeState.map((nd,j) => j).filter(j => j !== i && nodeState[j].cat === nodeState[i].cat);
    const picks = Math.floor(rand() * 2) + 1; // 1-2 same-cat edges each
    for (let p = 0; p < picks; p++) {
      const j = sameCat[Math.floor(rand() * sameCat.length)];
      if (j !== undefined) addEdge(i, j);
    }
  }

  // 2. Cross-category random connections (web feel) — ~30 extras
  for (let e = 0; e < 34; e++) {
    const a = Math.floor(rand() * n);
    const b = Math.floor(rand() * n);
    if (degreeCount[a] < 5 && degreeCount[b] < 5) addEdge(a, b);
  }
}

// ── Stars ─────────────────────────────────────────────────────────────────────
const stars = Array.from({length:280}, ()=>({x:Math.random(),y:Math.random(),s:Math.random()*1.8+0.2,a:Math.random()}));
function drawStars() {
  stars.forEach(s => {
    const f=0.4+0.6*(0.5+0.5*Math.sin(time*0.001*s.s+s.a*100));
    ctx.globalAlpha=f*s.a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.s*0.65,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawOrbitRing(r,a=0.09) {
  ctx.save(); ctx.strokeStyle=`rgba(240,165,0,${a})`; ctx.lineWidth=1;
  ctx.setLineDash([4,14]);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

// ── CoinDesk logo (canvas-drawn SVG approximation) ───────────────────────────
function drawCoinDeskIcon(x, y, size) {
  // Recreate the CoinDesk "C" mark with molecular bumps + 3 dots
  ctx.save();
  ctx.translate(x - size*0.12, y);
  const sc = size / 52;

  // Helper: filled circle
  const circ = (cx,cy,r) => { ctx.beginPath(); ctx.arc(cx*sc,cy*sc,r*sc,0,Math.PI*2); ctx.fill(); };

  ctx.fillStyle = '#F0A500';

  // Build the C-shape from overlapping rounded rectangles / circles
  // Spine (left vertical bar)
  ctx.beginPath();
  ctx.roundRect(-26*sc, -22*sc, 14*sc, 44*sc, 7*sc);
  ctx.fill();

  // Top bar
  ctx.beginPath();
  ctx.roundRect(-24*sc, -26*sc, 40*sc, 14*sc, 7*sc);
  ctx.fill();

  // Bottom bar
  ctx.beginPath();
  ctx.roundRect(-24*sc, 12*sc, 34*sc, 13*sc, 6.5*sc);
  ctx.fill();

  // Middle connector bumps (the lumps on the inner edge of C)
  circ(-8, -12, 9);   // upper inner lump
  circ(-8,  12, 9);   // lower inner lump

  // Erase inner hollow of C using destination-out
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.beginPath();
  ctx.roundRect(-8*sc, -14*sc, 36*sc, 28*sc, 6*sc);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#F0A500';

  // 3 dots (right side of logo)
  circ(30, -14, 6.5); // top-right
  circ(38, -2,  5.5); // middle-right
  circ(30,  12, 5.5); // bottom

  ctx.restore();
}

// ── Center node — canvas draws glow only; HTML <img> overlays the logo ───────
function drawCenter() {
  const pulse  = 1 + 0.03*Math.sin(time*0.002);
  const baseR  = Math.min(W,H)*0.062*pulse;

  // Pulsing glow layers
  [0.03,0.065,0.13,0.22].forEach((a,i) => {
    const gr = ctx.createRadialGradient(cx,cy,0,cx,cy,baseR*(2.7-i*0.4));
    gr.addColorStop(0,`rgba(240,165,0,${a})`); gr.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(cx,cy,baseR*(2.7-i*0.4),0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
  });

  // Solid black disc (HTML img sits on top via z-index / DOM layering)
  ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();

  // Gold ring (drawn on canvas, appears behind HTML element — redraw on top via DOM order)
  ctx.beginPath(); ctx.arc(cx,cy,baseR,0,Math.PI*2);
  ctx.strokeStyle='rgba(240,165,0,0.78)'; ctx.lineWidth=2.5; ctx.stroke();

  // Keep HTML logo pulsing in sync
  const el = document.getElementById('centerLogo');
  const d  = baseR*2;
  el.style.width  = d + 'px';
  el.style.height = d + 'px';
  el.style.left   = (cx - baseR) + 'px';
  el.style.top    = (cy - baseR) + 'px';
}

// ── Draw all edges (center→node and peer) ─────────────────────────────────────
function drawAllEdges() {
  const n = nodeState.length;

  // Center → every node
  for (let i = 0; i < n; i++) {
    const nd  = nodeState[i];
    const hov = hoveredIdx === i;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nd.x, nd.y);
    ctx.lineWidth   = hov ? 2.5 : 1.2;
    ctx.strokeStyle = hov ? nd.cat.color + 'cc' : 'rgba(240,165,0,0.32)';
    ctx.stroke();
  }

  // Peer → peer edges
  peerEdges.forEach(e => {
    const na = nodeState[e.a], nb = nodeState[e.b];
    if (!na || !nb) return;
    const hovA = hoveredIdx === e.a, hovB = hoveredIdx === e.b;
    const active = hovA || hovB;

    // Animate a soft pulse along the line
    const pulse = 0.5 + 0.5*Math.sin(time*0.0008 + e.phase);

    if (active) {
      // Glowing gradient line on hover
      const gr = ctx.createLinearGradient(na.x, na.y, nb.x, nb.y);
      gr.addColorStop(0, na.cat.color + 'dd');
      gr.addColorStop(1, nb.cat.color + 'dd');
      ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
      ctx.lineWidth = 2; ctx.strokeStyle = gr; ctx.stroke();
    } else {
      // Pulsing line at rest — more visible
      const alpha = (0.18 + 0.10*pulse).toFixed(2);
      ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
      ctx.lineWidth   = 1.0;
      ctx.strokeStyle = `rgba(180,200,255,${alpha})`;
      ctx.stroke();
    }
  });
}

// ── Node ──────────────────────────────────────────────────────────────────────
function drawNode(n, idx) {
  const hov  = hoveredIdx===idx;
  const pulse = 1 + 0.05*Math.sin(time*0.003+n.baseAngle);
  const r    = n.radius*(hov ? 1.4 : pulse);
  const key  = n.name.replace('\n',' ');
  const img  = imgCache[key];

  // Glow halo
  const grd = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*2.5);
  grd.addColorStop(0, n.cat.glow.replace('0.4', hov?'0.6':'0.25'));
  grd.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(n.x,n.y,r*2.5,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();

  // Circle
  ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
  if (img && img !== 'loading') {
    ctx.fillStyle='#111'; ctx.fill();
    ctx.save();
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.clip();
    // crop photo to square, center it
    const iw=img.width, ih=img.height;
    const side=Math.min(iw,ih);
    const sx=(iw-side)/2, sy=(ih-side)/2;
    ctx.drawImage(img, sx,sy,side,side, n.x-r,n.y-r,r*2,r*2);
    ctx.restore();
  } else {
    // Colored gradient fallback
    const nd = ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.3,0,n.x,n.y,r);
    nd.addColorStop(0,'#fff'); nd.addColorStop(0.3,n.cat.color); nd.addColorStop(1,n.cat.color+'44');
    ctx.fillStyle=nd; ctx.fill();
    // Initials
    const init = n.name.replace('\n',' ').split(' ').filter(w=>w.length).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    ctx.save();
    ctx.font=`bold ${Math.round(r*0.68)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(init, n.x, n.y);
    ctx.restore();
  }

  // Ring border
  ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
  ctx.strokeStyle = hov ? n.cat.color : n.cat.color+'66';
  ctx.lineWidth = hov?2.5:1.2; ctx.stroke();

  // Name + org label
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor=n.cat.color; ctx.shadowBlur=hov?14:4;

  const fs = hov?13:10.5;
  ctx.font=`${hov?700:600} ${fs}px 'Segoe UI',Arial`;
  ctx.fillStyle=hov?'#fff':'#ddeeff';
  const nameLines = n.name.split('\n');
  const ly = n.y + r + 5;
  nameLines.forEach((line,li) => ctx.fillText(line, n.x, ly + li*(fs+2)));

  // Org line — category color, slightly smaller
  const orgY = ly + nameLines.length*(fs+2) + 1;
  const ofs = hov?11:9;
  ctx.font=`500 ${ofs}px 'Segoe UI',Arial`;
  ctx.fillStyle = n.cat.color;
  ctx.shadowBlur = hov?8:3;
  ctx.fillText(n.org, n.x, orgY);

  ctx.restore();
}

// ── Render loop ───────────────────────────────────────────────────────────────
function frame(ts) {
  time=ts;
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.8);
  bg.addColorStop(0,'#0a1525'); bg.addColorStop(1,'#050a1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawStars();

  const md=Math.min(W,H);
  nodeState.forEach(n => {
    n.baseAngle+=n.speed;
    n.x=cx+n.r*Math.cos(n.baseAngle);
    n.y=cy+n.r*Math.sin(n.baseAngle);
  });

  drawOrbitRing(md*0.27,0.08);
  drawOrbitRing(md*0.44,0.06);
  drawAllEdges();
  nodeState.forEach((n,i)=>drawNode(n,i));
  drawCenter();
  requestAnimationFrame(frame);
}

// ── Mouse ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let found=-1;
  nodeState.forEach((n,i)=>{
    const dx=mx-n.x,dy=my-n.y;
    if(Math.sqrt(dx*dx+dy*dy)<n.radius*1.8)found=i;
  });
  hoveredIdx=found;
  if(found>=0){
    const n=nodeState[found];
    ttN.textContent=n.name.replace('\n',' ');
    ttR.textContent=n.role;
    tip.style.opacity='1';
    let tx=e.clientX+16,ty=e.clientY-8;
    if(tx+250>W)tx=e.clientX-258;
    if(ty+80>H)ty=e.clientY-88;
    tip.style.left=tx+'px'; tip.style.top=ty+'px';
    canvas.style.cursor='pointer';
  } else {
    tip.style.opacity='0';
    canvas.style.cursor='default';
  }
});
canvas.addEventListener('mouseleave',()=>{hoveredIdx=-1;tip.style.opacity='0';});
window.addEventListener('resize',resize);

// ── Tweet system ──────────────────────────────────────────────────────────────

// ▶ SET THIS to your Cloudflare Worker URL after deploying
const WORKER_URL = 'https://cool-pine-8cd1.sam-ewen.workers.dev';

const tweetCache = {};        // handle → tweet object
let   tweetQueue  = [];       // nodeState indices waiting to show card
let   activeCards = new Set();// indices currently showing a card
const MAX_CARDS      = 3;             // max simultaneous cards
const CARD_DUR       = 7;             // seconds each card stays visible
const FETCH_INTERVAL = 5 * 60 * 1000; // refresh every 5 min
const MAX_TWEET_AGE  = 5 * 60 * 60 * 1000; // 5 hours in ms

async function fetchTweets() {
  const handles = nodes.map(n => n.tw).filter(Boolean);
  if (!WORKER_URL.includes('YOUR-SUBDOMAIN')) {
    try {
      const url = `${WORKER_URL}/tweets?handles=${handles.join(',')}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      Object.assign(tweetCache, data);
      console.log(`[tweets] loaded ${Object.keys(data).length} tweets`);
      // Seed queue with nodes that have tweets newer than 5 hours
      const now = Date.now();
      tweetQueue = nodeState
        .map((_,i)=>i)
        .filter(i => {
          const tweet = tweetCache[nodeState[i]?.tw?.toLowerCase()];
          if (!tweet) return false;
          return (now - new Date(tweet.created).getTime()) < MAX_TWEET_AGE;
        })
        .sort(() => Math.random() - 0.5);
    } catch(e) {
      console.warn('[tweets] fetch failed:', e);
    }
  }
}

function timeAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr)) / 1000;
  if (diff < 60)   return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function truncate(text, max=160) {
  return text.length > max ? text.slice(0, max).trimEnd() + '…' : text;
}

function showTweetCard(nodeIdx) {
  const n = nodeState[nodeIdx];
  if (!n) return;
  const tweet = tweetCache[n.tw?.toLowerCase()];
  if (!tweet) return;
  if ((Date.now() - new Date(tweet.created).getTime()) >= MAX_TWEET_AGE) return;

  activeCards.add(nodeIdx);

  const card = document.createElement('div');
  card.className = 'tweet-card';
  card.style.setProperty('--dur', `${CARD_DUR}s`);

  // Color the border with node's category color
  card.style.borderColor = n.cat.color + '88';
  card.style.boxShadow = `0 0 20px ${n.cat.color}33, 0 4px 24px rgba(0,0,0,0.6)`;

  const avatarHtml = tweet.avatar
    ? `<img class="tc-avatar" src="${tweet.avatar}" alt="" crossorigin="anonymous"/>`
    : `<div class="tc-avatar-placeholder" style="background:${n.cat.color}">${(tweet.name||'?')[0]}</div>`;

  card.innerHTML = `
    <div class="tc-header">
      ${avatarHtml}
      <div class="tc-meta">
        <span class="tc-name">${tweet.name}</span>
        <span class="tc-handle">@${tweet.handle}</span>
      </div>
    </div>
    <div class="tc-text">${truncate(tweet.text)}</div>
    <div class="tc-footer">
      <span>♥ ${tweet.likes.toLocaleString()}</span>
      <span>↺ ${tweet.retweets.toLocaleString()}</span>
      <span class="tc-time">${timeAgo(tweet.created)}</span>
    </div>`;

  // Position near the node — offset so it doesn't overlap the photo
  const offX = n.x > cx ? -(248) : 8;
  const offY = -60;
  card.style.left = (n.x + offX) + 'px';
  card.style.top  = (n.y + offY) + 'px';

  document.body.appendChild(card);

  // Remove after animation completes
  const total = (CARD_DUR + 0.4) * 1000;
  setTimeout(() => {
    card.remove();
    activeCards.delete(nodeIdx);
    // Re-queue this node at the back
    tweetQueue.push(nodeIdx);
  }, total);
}

// Drip cards out one at a time with spacing
function tickTweetQueue() {
  if (activeCards.size < MAX_CARDS && tweetQueue.length > 0) {
    // Pick next node not already showing
    const idx = tweetQueue.findIndex(i => !activeCards.has(i));
    if (idx !== -1) {
      const nodeIdx = tweetQueue.splice(idx, 1)[0];
      showTweetCard(nodeIdx);
    }
  }
  // Stagger: new card every 2.5s if slots open
  setTimeout(tickTweetQueue, 2500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
requestAnimationFrame(frame);
loadAllImages();
fetchTweets().then(() => setTimeout(tickTweetQueue, 3000));
setInterval(fetchTweets, FETCH_INTERVAL);
</script>
